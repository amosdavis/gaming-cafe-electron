name: Test Kiosk ISO Installation

# Triggers automatically after a successful build, or manually with an ISO URL override.
on:
  workflow_run:
    workflows: ["Build & Publish Kiosk ISO"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Full Azure Blob URL of ISO to test (leave blank to derive from HEAD SHA)'
        required: false

env:
  STORAGE_ACCOUNT: isobuilds
  STORAGE_CONTAINER: kiosk-releases

jobs:

  test-installation:
    name: Boot & Test Kiosk ISO
    runs-on: ubuntu-latest
    # Only run when the build succeeded (or when triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:

      # ── Resolve ISO URL ──────────────────────────────────────────────────────
      - name: Resolve ISO URL
        id: iso
        env:
          MANUAL_URL: ${{ github.event.inputs.iso_url }}
          # workflow_run exposes the triggering commit SHA
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -n "$MANUAL_URL" ]; then
            ISO_URL="$MANUAL_URL"
          else
            # Derive using same version logic as build-kiosk-iso.yml
            SHORT_SHA="${TRIGGER_SHA:0:7}"
            VERSION="dev-${SHORT_SHA}"
            ISO_FILENAME="GamingCafeKiosk-${VERSION}.iso"
            ISO_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}/${VERSION}/${ISO_FILENAME}"
          fi
          echo "url=${ISO_URL}" >> "$GITHUB_OUTPUT"
          echo "ISO URL: ${ISO_URL}"

      # ── Free disk space ──────────────────────────────────────────────────────
      # Need ~30 GB free: ~5 GB ISO + ~22 GB qcow2 growth + headroom
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Check available disk space
        run: df -h /

      # ── Install tools ────────────────────────────────────────────────────────
      - name: Install QEMU, OVMF, and disk tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils qemu-system-x86 ovmf \
            nbd-client ntfs-3g \
            imagemagick socat \
            mtools dosfstools \
            ca-certificates curl apt-transport-https lsb-release gnupg
          # Install Azure CLI if not already present
          if ! command -v az &>/dev/null; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi
          # Verify KVM is available
          if [ -c /dev/kvm ]; then
            echo "KVM is available — QEMU will run at near-native speed."
            sudo chmod 666 /dev/kvm
          else
            echo "WARNING: /dev/kvm not available — QEMU will run in software emulation (slow)."
          fi

      # ── Download ISO ─────────────────────────────────────────────────────────
      - name: Download kiosk ISO from Azure Blob Storage
        env:
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          ISO_URL="${{ steps.iso.outputs.url }}"
          ISO_FILE="kiosk-test.iso"
          echo "Downloading: ${ISO_URL}"
          # Extract container and blob path from URL
          # URL format: https://<account>.blob.core.windows.net/<container>/<path>
          BLOB_PATH=$(echo "$ISO_URL" | sed 's|https://[^/]*/[^/]*/||')
          az storage blob download \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$STORAGE_CONTAINER" \
            --name "$BLOB_PATH" \
            --file "$ISO_FILE" \
            --auth-mode key \
            --account-key "$AZURE_STORAGE_KEY"
          ls -lh "$ISO_FILE"

      # ── Create virtual disk ──────────────────────────────────────────────────
      - name: Create 40 GB sparse virtual disk
        run: |
          qemu-img create -f qcow2 kiosk-vm.qcow2 40G
          qemu-img info kiosk-vm.qcow2

      # ── Create screenshot directory ──────────────────────────────────────────
      - name: Create artifacts directory
        run: mkdir -p screenshots

      # ── Launch QEMU ──────────────────────────────────────────────────────────
      - name: Launch QEMU (headless)
        run: |
          KVM_FLAG=""
          [ -c /dev/kvm ] && KVM_FLAG="-enable-kvm"

          # Locate OVMF firmware (paths differ across Ubuntu versions)
          OVMF_CODE=""
          for p in \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/edk2/x64/OVMF_CODE.fd \
            /usr/share/qemu/OVMF.fd; do
            if [ -f "$p" ]; then OVMF_CODE="$p"; break; fi
          done
          OVMF_VARS=""
          for p in \
            /usr/share/OVMF/OVMF_VARS.fd \
            /usr/share/OVMF/OVMF_VARS_4M.fd \
            /usr/share/edk2/x64/OVMF_VARS.fd; do
            if [ -f "$p" ]; then OVMF_VARS="$p"; break; fi
          done
          if [ -z "$OVMF_CODE" ] || [ -z "$OVMF_VARS" ]; then
            echo "ERROR: OVMF firmware files not found. Listing /usr/share/OVMF/:"
            ls /usr/share/OVMF/ 2>/dev/null || true
            echo "Listing /usr/share/edk2/ :"
            ls /usr/share/edk2/ 2>/dev/null || true
            exit 1
          fi
          echo "Using OVMF_CODE=${OVMF_CODE}"
          echo "Using OVMF_VARS=${OVMF_VARS}"

          # Copy VARS so each run gets a fresh writable copy
          cp "$OVMF_VARS" ovmf-vars.fd

          qemu-system-x86_64 \
            $KVM_FLAG \
            -machine q35 \
            -m 4096 \
            -smp 4 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=ovmf-vars.fd \
            -device ich9-ahci,id=ahci \
            -drive if=none,id=hd0,format=qcow2,file=kiosk-vm.qcow2 \
            -device ide-hd,bus=ahci.0,drive=hd0 \
            -drive if=none,id=cdrom0,format=raw,media=cdrom,file=kiosk-test.iso \
            -device ide-cd,bus=ahci.1,drive=cdrom0,bootindex=1 \
            -serial file:serial.log \
            -monitor unix:qemu.sock,server,nowait \
            -display vnc=127.0.0.1:1 \
            -name "Gaming Cafe Kiosk Test" \
            -pidfile /tmp/qemu.pid \
            &>/tmp/qemu-stdout.log &
          QEMU_PID=$!
          echo $QEMU_PID > /tmp/qemu-bg.pid
          echo "QEMU launched (PID ${QEMU_PID}). Waiting 10s for startup..."
          sleep 10
          if kill -0 $QEMU_PID 2>/dev/null; then
            echo "QEMU is running. Initial stdout:"
            cat /tmp/qemu-stdout.log || true
          else
            echo "ERROR: QEMU exited immediately. stdout log:"
            cat /tmp/qemu-stdout.log
            exit 1
          fi

      # ── Screenshot + completion polling loop ─────────────────────────────────
      - name: Wait for setup to complete (poll serial log, screenshot every 2 min)
        timeout-minutes: 200
        run: |
          SCREENSHOT_N=0
          FOUND=false
          START=$(date +%s)
          TIMEOUT=10800  # 180 minutes

          take_screenshot() {
            local name="$1"
            if [ -S qemu.sock ]; then
              echo "screendump /tmp/qemu-screen.ppm" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
              if [ -f /tmp/qemu-screen.ppm ]; then
                local sz
                sz=$(wc -c < /tmp/qemu-screen.ppm 2>/dev/null || echo 0)
                convert /tmp/qemu-screen.ppm "screenshots/${name}.png" 2>/dev/null || \
                  cp /tmp/qemu-screen.ppm "screenshots/${name}.ppm"
                echo "Screenshot saved: ${name} (framebuffer ${sz} bytes)"
              else
                echo "WARNING: screendump produced no file for ${name}"
              fi
            fi
          }

          # Take an initial screenshot after 30s and dump startup diagnostics
          sleep 30
          take_screenshot "00-initial"
          echo "=== QEMU stdout at +30s ==="
          cat /tmp/qemu-stdout.log 2>/dev/null || echo "(qemu stdout empty)"
          echo "=== Serial log at +30s ==="
          cat serial.log 2>/dev/null || echo "(serial.log empty)"
          echo "=== QEMU PID still running? ==="
          kill -0 "$(cat /tmp/qemu-bg.pid 2>/dev/null)" 2>/dev/null && echo "Yes" || echo "No — QEMU exited!"

          while true; do
            ELAPSED=$(( $(date +%s) - START ))

            # Check for completion marker
            if grep -q "KIOSK_SETUP_COMPLETE" serial.log 2>/dev/null; then
              echo "Completion marker detected in serial.log after ${ELAPSED}s."
              FOUND=true
              break
            fi

            # Log when setup-complete.cmd first starts running
            if grep -q "KIOSK_SETUP_STARTED" serial.log 2>/dev/null && [ "${SETUP_STARTED:-0}" = "0" ]; then
              echo "INFO: KIOSK_SETUP_STARTED marker detected at ${ELAPSED}s — Windows setup complete, kiosk installer running."
              SETUP_STARTED=1
            fi

            # Check for setup failure
            if grep -q "KIOSK_SETUP_FAILED" serial.log 2>/dev/null; then
              echo "ERROR: setup-complete.cmd reported FAILED in serial log."
              cat serial.log
              exit 1
            fi

            # Timeout
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "ERROR: Timed out after ${TIMEOUT}s waiting for KIOSK_SETUP_COMPLETE."
              echo "=== QEMU stdout ==="
              cat /tmp/qemu-stdout.log 2>/dev/null || echo "(empty)"
              echo "=== Serial log ==="
              cat serial.log 2>/dev/null || echo "(serial.log empty)"
              exit 1
            fi

            # Every 900s (15 min) dump serial.log for in-progress diagnostics
            MOD15=$(( ELAPSED % 900 ))
            if [ "$MOD15" -lt 10 ] && [ "$ELAPSED" -gt 60 ]; then
              echo "--- Serial log at ${ELAPSED}s ---"
              cat serial.log 2>/dev/null || echo "(empty)"
            fi

            # Every 120 s take a screenshot
            MOD=$(( ELAPSED % 120 ))
            if [ "$MOD" -lt 10 ]; then
              SCREENSHOT_N=$(( SCREENSHOT_N + 1 ))
              take_screenshot "$(printf '%02d' $SCREENSHOT_N)-t${ELAPSED}s"
            fi

            sleep 10
          done

      # ── Wait for post-setup reboot and kiosk start ───────────────────────────
      - name: Wait for kiosk to start after post-setup reboot
        run: |
          echo "Setup done. Windows will reboot and start the kiosk shell (~3 min)..."
          sleep 180

      - name: Take final screenshot (kiosk should be visible)
        run: |
          if [ -S qemu.sock ]; then
            echo "screendump /tmp/qemu-screen.ppm" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
            if [ -f /tmp/qemu-screen.ppm ]; then
              convert /tmp/qemu-screen.ppm screenshots/FINAL-kiosk-shell.png 2>/dev/null || \
                cp /tmp/qemu-screen.ppm screenshots/FINAL-kiosk-shell.ppm
              echo "Final screenshot saved."
            fi
          fi

      # ── Graceful QEMU shutdown ────────────────────────────────────────────────
      - name: Shut down QEMU
        if: always()
        run: |
          if [ -S qemu.sock ]; then
            echo "system_powerdown" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
            sleep 15
          fi
          # Kill by saved PID if still running
          if [ -f /tmp/qemu-bg.pid ]; then
            QEMU_PID=$(cat /tmp/qemu-bg.pid)
            kill "$QEMU_PID" 2>/dev/null || true
          fi
          pkill -f "qemu-system-x86_64" 2>/dev/null || true
          sleep 3

      # ── Mount disk and read SetupComplete.log ────────────────────────────────
      - name: Mount virtual disk and read SetupComplete.log
        id: read-log
        run: |
          sudo modprobe nbd max_part=8
          sudo qemu-nbd -c /dev/nbd0 kiosk-vm.qcow2
          sleep 3
          sudo partprobe /dev/nbd0 2>/dev/null || true
          sleep 2

          # List partitions
          lsblk /dev/nbd0

          # Windows partition is partition 3 (EFI=1, MSR=2, Windows=3)
          sudo mkdir -p /mnt/kiosk-windows
          sudo ntfs-3g /dev/nbd0p3 /mnt/kiosk-windows -o ro,nofail 2>/dev/null || \
            sudo mount -t ntfs-3g /dev/nbd0p3 /mnt/kiosk-windows -o ro,nofail

          LOG_PATH="/mnt/kiosk-windows/Windows/Setup/Scripts/SetupComplete.log"
          if [ -f "$LOG_PATH" ]; then
            echo "========== SetupComplete.log =========="
            cat "$LOG_PATH"
            echo "======================================="
            cp "$LOG_PATH" screenshots/SetupComplete.log

            # Check for failures
            if grep -iE "=== First-boot setup FAILED|ERROR:" "$LOG_PATH"; then
              echo "FAIL=true" >> "$GITHUB_OUTPUT"
            else
              echo "FAIL=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "WARNING: SetupComplete.log not found — setup may not have run."
            echo "FAIL=true" >> "$GITHUB_OUTPUT"
          fi

          # Check shell registry key
          SETUP_LOG="screenshots/registry-check.txt"
          sudo cat /mnt/kiosk-windows/Windows/System32/config/SOFTWARE 2>/dev/null || true

          sudo umount /mnt/kiosk-windows 2>/dev/null || true
          sudo qemu-nbd -d /dev/nbd0 2>/dev/null || true

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Collect diagnostic logs
        if: always()
        run: |
          cp /tmp/qemu-stdout.log screenshots/qemu-stdout.log 2>/dev/null || true
          cp serial.log screenshots/serial.log 2>/dev/null || true

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-install-test-${{ github.run_number }}
          path: screenshots/
          retention-days: 14

      # ── Final pass/fail ──────────────────────────────────────────────────────
      - name: Fail job if setup reported errors
        if: steps.read-log.outputs.FAIL == 'true'
        run: |
          echo "SetupComplete.log contained errors or was missing. See uploaded artifacts."
          exit 1

      - name: Print test summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Kiosk ISO Install Test Complete"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "  ISO : ${{ steps.iso.outputs.url }}"
          echo "  Artifacts: screenshots + SetupComplete.log uploaded"
          echo "╚══════════════════════════════════════════════════════╝"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Run Playwright E2E UI tests after a successful installation
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: Playwright E2E UI Tests
    runs-on: ubuntu-latest
    needs: test-installation
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system packages (xvfb + Electron deps)
        run: |
          sudo apt-get update -qq
          # Install packages that exist on all supported Ubuntu versions
          sudo apt-get install -y xvfb libnss3 libxss1 libxtst6 libxrandr2 libgbm1
          # libgtk-3-0 was renamed libgtk-3-0t64 on Ubuntu 24.04+
          sudo apt-get install -y libgtk-3-0 2>/dev/null \
            || sudo apt-get install -y libgtk-3-0t64 2>/dev/null || true
          # libasound2 was renamed libasound2t64 on Ubuntu 24.04+
          sudo apt-get install -y libasound2 2>/dev/null \
            || sudo apt-get install -y libasound2t64 2>/dev/null || true

      - name: Build Electron app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run -a npx playwright test
        env:
          CI: true
          ELECTRON_DISABLE_GPU: '1'

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Print E2E summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Kiosk E2E UI Tests Complete"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "  53 scenarios across login / admin / navigation / security"
          echo "╚══════════════════════════════════════════════════════╝"
