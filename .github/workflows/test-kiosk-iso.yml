name: Test Kiosk ISO Installation

# Triggers automatically after a successful build, or manually with an ISO URL override.
on:
  workflow_run:
    workflows: ["Build & Publish Kiosk ISO"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Full Azure Blob URL of ISO to test (leave blank to derive from HEAD SHA)'
        required: false

env:
  STORAGE_ACCOUNT: isobuilds
  STORAGE_CONTAINER: kiosk-releases

jobs:

  test-installation:
    name: Boot & Test Kiosk ISO
    runs-on: ubuntu-latest
    # Only run when the build succeeded (or when triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:

      # ── Resolve ISO URL ──────────────────────────────────────────────────────
      - name: Resolve ISO URL
        id: iso
        env:
          MANUAL_URL: ${{ github.event.inputs.iso_url }}
          # workflow_run exposes the triggering commit SHA
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -n "$MANUAL_URL" ]; then
            ISO_URL="$MANUAL_URL"
          else
            # Derive using same version logic as build-kiosk-iso.yml
            SHORT_SHA="${TRIGGER_SHA:0:7}"
            VERSION="dev-${SHORT_SHA}"
            ISO_FILENAME="GamingCafeKiosk-${VERSION}.iso"
            ISO_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}/${VERSION}/${ISO_FILENAME}"
          fi
          echo "url=${ISO_URL}" >> "$GITHUB_OUTPUT"
          echo "ISO URL: ${ISO_URL}"

      # ── Free disk space ──────────────────────────────────────────────────────
      # Need ~30 GB free: ~5 GB ISO + ~22 GB qcow2 growth + headroom
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Check available disk space
        run: df -h /

      # ── Install tools ────────────────────────────────────────────────────────
      - name: Install QEMU, OVMF, and disk tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils qemu-system-x86 ovmf \
            nbd-client ntfs-3g \
            imagemagick
          # Verify KVM is available
          if [ -c /dev/kvm ]; then
            echo "KVM is available — QEMU will run at near-native speed."
            sudo chmod 666 /dev/kvm
          else
            echo "WARNING: /dev/kvm not available — QEMU will run in software emulation (slow)."
          fi

      # ── Download ISO ─────────────────────────────────────────────────────────
      - name: Download kiosk ISO from Azure Blob Storage
        env:
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          ISO_URL="${{ steps.iso.outputs.url }}"
          ISO_FILE="kiosk-test.iso"
          echo "Downloading: ${ISO_URL}"
          # Extract container and blob path from URL
          # URL format: https://<account>.blob.core.windows.net/<container>/<path>
          BLOB_PATH=$(echo "$ISO_URL" | sed 's|https://[^/]*/[^/]*/||')
          az storage blob download \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$STORAGE_CONTAINER" \
            --name "$BLOB_PATH" \
            --file "$ISO_FILE" \
            --auth-mode key \
            --account-key "$AZURE_STORAGE_KEY"
          ls -lh "$ISO_FILE"

      # ── Create virtual disk ──────────────────────────────────────────────────
      - name: Create 40 GB sparse virtual disk
        run: |
          qemu-img create -f qcow2 kiosk-vm.qcow2 40G
          qemu-img info kiosk-vm.qcow2

      # ── Create screenshot directory ──────────────────────────────────────────
      - name: Create artifacts directory
        run: mkdir -p screenshots

      # ── Launch QEMU ──────────────────────────────────────────────────────────
      - name: Launch QEMU (headless)
        run: |
          KVM_FLAG=""
          [ -c /dev/kvm ] && KVM_FLAG="-enable-kvm"

          # OVMF UEFI firmware paths (Ubuntu package locations)
          OVMF_CODE="/usr/share/OVMF/OVMF_CODE.fd"
          OVMF_VARS="/usr/share/OVMF/OVMF_VARS.fd"
          # Copy VARS so each run gets a fresh writable copy
          cp "$OVMF_VARS" ovmf-vars.fd

          qemu-system-x86_64 \
            $KVM_FLAG \
            -m 4096 \
            -smp 4 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=ovmf-vars.fd \
            -drive if=virtio,format=qcow2,file=kiosk-vm.qcow2 \
            -drive if=ide,media=cdrom,file=kiosk-test.iso \
            -boot order=dc,once=d \
            -serial file:serial.log \
            -monitor unix:qemu.sock,server,nowait \
            -display none \
            -name "Gaming Cafe Kiosk Test" \
            -daemonize
          echo "QEMU started. PID: $(cat /tmp/qemu.pid 2>/dev/null || echo 'unknown')"
          sleep 5
          echo "QEMU process check:"
          pgrep -a qemu-system-x86_64 || echo "(no match — may have exited early)"

      # ── Screenshot + completion polling loop ─────────────────────────────────
      - name: Wait for setup to complete (poll serial log, screenshot every 2 min)
        timeout-minutes: 38
        run: |
          SCREENSHOT_N=0
          FOUND=false
          START=$(date +%s)
          TIMEOUT=2100  # 35 minutes

          take_screenshot() {
            local name="$1"
            if [ -S qemu.sock ]; then
              echo "screendump /tmp/qemu-screen.ppm" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
              if [ -f /tmp/qemu-screen.ppm ]; then
                convert /tmp/qemu-screen.ppm "screenshots/${name}.png" 2>/dev/null || \
                  cp /tmp/qemu-screen.ppm "screenshots/${name}.ppm"
                echo "Screenshot saved: ${name}"
              fi
            fi
          }

          # Take an initial screenshot after 30s
          sleep 30
          take_screenshot "00-initial"

          while true; do
            ELAPSED=$(( $(date +%s) - START ))

            # Check for completion marker
            if grep -q "KIOSK_SETUP_COMPLETE" serial.log 2>/dev/null; then
              echo "Completion marker detected in serial.log after ${ELAPSED}s."
              FOUND=true
              break
            fi

            # Check for setup failure
            if grep -q "First-boot setup FAILED" serial.log 2>/dev/null; then
              echo "ERROR: setup-complete.cmd reported FAILED in serial log."
              cat serial.log
              exit 1
            fi

            # Timeout
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "ERROR: Timed out after ${TIMEOUT}s waiting for KIOSK_SETUP_COMPLETE."
              cat serial.log 2>/dev/null || echo "(serial.log empty)"
              exit 1
            fi

            # Every 120 s take a screenshot
            MOD=$(( ELAPSED % 120 ))
            if [ "$MOD" -lt 10 ]; then
              SCREENSHOT_N=$(( SCREENSHOT_N + 1 ))
              take_screenshot "$(printf '%02d' $SCREENSHOT_N)-t${ELAPSED}s"
            fi

            sleep 10
          done

      # ── Wait for post-setup reboot and kiosk start ───────────────────────────
      - name: Wait for kiosk to start after post-setup reboot
        run: |
          echo "Setup done. Windows will reboot and start the kiosk shell (~3 min)..."
          sleep 180

      - name: Take final screenshot (kiosk should be visible)
        run: |
          if [ -S qemu.sock ]; then
            echo "screendump /tmp/qemu-screen.ppm" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
            if [ -f /tmp/qemu-screen.ppm ]; then
              convert /tmp/qemu-screen.ppm screenshots/FINAL-kiosk-shell.png 2>/dev/null || \
                cp /tmp/qemu-screen.ppm screenshots/FINAL-kiosk-shell.ppm
              echo "Final screenshot saved."
            fi
          fi

      # ── Graceful QEMU shutdown ────────────────────────────────────────────────
      - name: Shut down QEMU
        if: always()
        run: |
          if [ -S qemu.sock ]; then
            echo "system_powerdown" | socat - UNIX-CONNECT:qemu.sock 2>/dev/null || true
            sleep 15
          fi
          pkill -f "qemu-system-x86_64" 2>/dev/null || true
          sleep 3

      # ── Mount disk and read SetupComplete.log ────────────────────────────────
      - name: Mount virtual disk and read SetupComplete.log
        id: read-log
        run: |
          sudo modprobe nbd max_part=8
          sudo qemu-nbd -c /dev/nbd0 kiosk-vm.qcow2
          sleep 3
          sudo partprobe /dev/nbd0 2>/dev/null || true
          sleep 2

          # List partitions
          lsblk /dev/nbd0

          # Windows partition is partition 3 (EFI=1, MSR=2, Windows=3)
          sudo mkdir -p /mnt/kiosk-windows
          sudo ntfs-3g /dev/nbd0p3 /mnt/kiosk-windows -o ro,nofail 2>/dev/null || \
            sudo mount -t ntfs-3g /dev/nbd0p3 /mnt/kiosk-windows -o ro,nofail

          LOG_PATH="/mnt/kiosk-windows/Windows/Setup/Scripts/SetupComplete.log"
          if [ -f "$LOG_PATH" ]; then
            echo "========== SetupComplete.log =========="
            cat "$LOG_PATH"
            echo "======================================="
            cp "$LOG_PATH" screenshots/SetupComplete.log

            # Check for failures
            if grep -iE "=== First-boot setup FAILED|ERROR:" "$LOG_PATH"; then
              echo "FAIL=true" >> "$GITHUB_OUTPUT"
            else
              echo "FAIL=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "WARNING: SetupComplete.log not found — setup may not have run."
            echo "FAIL=true" >> "$GITHUB_OUTPUT"
          fi

          # Check shell registry key
          SETUP_LOG="screenshots/registry-check.txt"
          sudo cat /mnt/kiosk-windows/Windows/System32/config/SOFTWARE 2>/dev/null || true

          sudo umount /mnt/kiosk-windows 2>/dev/null || true
          sudo qemu-nbd -d /dev/nbd0 2>/dev/null || true

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-install-test-${{ github.run_number }}
          path: screenshots/
          retention-days: 14

      # ── Final pass/fail ──────────────────────────────────────────────────────
      - name: Fail job if setup reported errors
        if: steps.read-log.outputs.FAIL == 'true'
        run: |
          echo "SetupComplete.log contained errors or was missing. See uploaded artifacts."
          exit 1

      - name: Print test summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Kiosk ISO Install Test Complete"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "  ISO : ${{ steps.iso.outputs.url }}"
          echo "  Artifacts: screenshots + SetupComplete.log uploaded"
          echo "╚══════════════════════════════════════════════════════╝"
