name: Test Kiosk ISO Installation

# Triggers automatically after a successful build, or manually with an ISO URL override.
on:
  workflow_run:
    workflows: ["Build & Publish Kiosk ISO"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Full Azure Blob URL of ISO to test (leave blank to derive from HEAD SHA)'
        required: false

env:
  STORAGE_ACCOUNT: isobuilds
  STORAGE_CONTAINER: kiosk-releases

jobs:

  test-installation:
    name: Windows Installer & Kiosk Setup
    runs-on: windows-latest
    timeout-minutes: 30
    # Only run when the build succeeded (or when triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:

      # ── Resolve ISO URL ──────────────────────────────────────────────────────
      - name: Resolve ISO URL
        id: iso
        shell: bash
        env:
          MANUAL_URL: ${{ github.event.inputs.iso_url }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -n "$MANUAL_URL" ]; then
            ISO_URL="$MANUAL_URL"
          else
            SHORT_SHA="${TRIGGER_SHA:0:7}"
            VERSION="dev-${SHORT_SHA}"
            ISO_FILENAME="GamingCafeKiosk-${VERSION}.iso"
            ISO_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}/${VERSION}/${ISO_FILENAME}"
          fi
          echo "url=${ISO_URL}" >> "$GITHUB_OUTPUT"
          echo "ISO URL: ${ISO_URL}"

      # ── Download ISO ─────────────────────────────────────────────────────────
      - name: Download kiosk ISO from Azure Blob Storage
        shell: pwsh
        env:
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          $isoUrl = "${{ steps.iso.outputs.url }}"
          Write-Host "Downloading: $isoUrl"
          $blobPath = $isoUrl -replace 'https://[^/]+/[^/]+/', ''
          az storage blob download `
            --account-name "$env:STORAGE_ACCOUNT" `
            --container-name "$env:STORAGE_CONTAINER" `
            --name "$blobPath" `
            --file "kiosk-test.iso" `
            --auth-mode key `
            --account-key "$env:AZURE_STORAGE_KEY"
          $sizeMB = [math]::Round((Get-Item "kiosk-test.iso").Length / 1MB)
          Write-Host "Downloaded: ${sizeMB} MB"

      # ── Mount ISO ───────────────────────────────────────────────────────────
      - name: Mount ISO and verify structure
        shell: pwsh
        run: |
          $iso = (Resolve-Path "kiosk-test.iso").Path
          $mount = Mount-DiskImage -ImagePath $iso -PassThru
          $drive = ($mount | Get-Volume | Select-Object -First 1).DriveLetter
          Write-Host "ISO mounted at ${drive}:"
          Get-ChildItem "${drive}:\" | Select-Object -ExpandProperty Name
          if (-not (Test-Path "${drive}:\KioskSetup\GamingCafeKiosk-Setup.exe")) {
            Dismount-DiskImage -ImagePath $iso | Out-Null
            throw "GamingCafeKiosk-Setup.exe not found on ISO"
          }
          Write-Host "OK: Installer found on ISO"
          "ISO_DRIVE=$drive" | Out-File $env:GITHUB_ENV -Append

      # ── Install kiosk ───────────────────────────────────────────────────────
      - name: Install Gaming Cafe Kiosk (silent NSIS)
        shell: pwsh
        run: |
          $installer = "$env:ISO_DRIVE:\KioskSetup\GamingCafeKiosk-Setup.exe"
          Write-Host "Running: $installer /S"
          $p = Start-Process -FilePath $installer -ArgumentList "/S" -Wait -PassThru
          Write-Host "Exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($p.ExitCode)"
          }
          $kioskExe = "C:\Program Files\Gaming Cafe Kiosk\Gaming Cafe Kiosk.exe"
          if (-not (Test-Path $kioskExe)) {
            throw "Kiosk exe not found after install: $kioskExe"
          }
          $info = Get-Item $kioskExe
          Write-Host "OK: Kiosk installed — $([math]::Round($info.Length / 1MB, 2)) MB"
          Write-Host "Version: $($info.VersionInfo.FileVersion)"

      # ── Run lockdown script ─────────────────────────────────────────────────
      - name: Run OS lockdown script
        shell: pwsh
        run: |
          $lockdown = "$env:ISO_DRIVE:\KioskSetup\windows-lockdown.ps1"
          Write-Host "Running: $lockdown"
          # Use a non-existent test user so group membership is not modified
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File "$lockdown" `
            -KioskUser "GamingCafeKioskCI" `
            -KioskPassword "CI_Test_Only_123!"
          Write-Host "Lockdown script completed."

      # ── Verify registry keys ────────────────────────────────────────────────
      - name: Verify lockdown registry keys
        shell: pwsh
        run: |
          $errors = 0
          # Task Manager disabled (F-09)
          $tm = (Get-ItemProperty `
            "HKCU:\Software\Microsoft\Windows\CurrentVersion\Policies\System" `
            -Name DisableTaskMgr -ErrorAction SilentlyContinue).DisableTaskMgr
          if ($tm -ne 1) {
            Write-Warning "DisableTaskMgr not set (got: $tm)"
            $errors++
          } else { Write-Host "OK: DisableTaskMgr = 1" }
          # USB AutoRun disabled (F-27)
          $ar = (Get-ItemProperty `
            "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" `
            -Name NoDriveTypeAutoRun -ErrorAction SilentlyContinue).NoDriveTypeAutoRun
          if ($ar -ne 255) {
            Write-Warning "NoDriveTypeAutoRun not set (got: $ar)"
            $errors++
          } else { Write-Host "OK: NoDriveTypeAutoRun = 255" }
          if ($errors -gt 0) {
            throw "$errors registry key(s) not set correctly after lockdown"
          }
          Write-Host "OK: All registry verifications passed."

      # ── Set kiosk shell ─────────────────────────────────────────────────────
      - name: Set and verify kiosk shell registry key
        shell: pwsh
        run: |
          $kioskExe = "`"C:\Program Files\Gaming Cafe Kiosk\Gaming Cafe Kiosk.exe`""
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" `
            /v Shell /t REG_SZ /d $kioskExe /f
          $shell = (Get-ItemProperty `
            "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" `
            -Name Shell).Shell
          Write-Host "Shell key: $shell"
          if ($shell -notlike "*Gaming Cafe Kiosk*") {
            throw "Shell registry key not set to kiosk (got: $shell)"
          }
          Write-Host "OK: Shell registry key verified."

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Unmount ISO
        if: always()
        shell: pwsh
        run: |
          try {
            $iso = (Resolve-Path "kiosk-test.iso" -ErrorAction SilentlyContinue).Path
            if ($iso) { Dismount-DiskImage -ImagePath $iso | Out-Null }
            Write-Host "ISO unmounted."
          } catch {
            Write-Warning "Could not unmount ISO: $_"
          }

      - name: Print test summary
        if: always()
        shell: bash
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Kiosk Installer Test Complete"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "  ISO : ${{ steps.iso.outputs.url }}"
          echo "  Runner: windows-latest (Windows Server 2022)"
          echo "╚══════════════════════════════════════════════════════╝"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Run Playwright E2E UI tests after a successful installation
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: Playwright E2E UI Tests
    runs-on: ubuntu-latest
    needs: test-installation
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system packages (xvfb + Electron deps)
        run: |
          sudo apt-get update -qq
          # Install packages that exist on all supported Ubuntu versions
          sudo apt-get install -y xvfb libnss3 libxss1 libxtst6 libxrandr2 libgbm1
          # libgtk-3-0 was renamed libgtk-3-0t64 on Ubuntu 24.04+
          sudo apt-get install -y libgtk-3-0 2>/dev/null \
            || sudo apt-get install -y libgtk-3-0t64 2>/dev/null || true
          # libasound2 was renamed libasound2t64 on Ubuntu 24.04+
          sudo apt-get install -y libasound2 2>/dev/null \
            || sudo apt-get install -y libasound2t64 2>/dev/null || true

      - name: Build Electron app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run -a npx playwright test
        env:
          CI: true
          ELECTRON_DISABLE_GPU: '1'
          KIOSK_E2E_TEST: '1'

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Print E2E summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Kiosk E2E UI Tests Complete"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "  53 scenarios across login / admin / navigation / security"
          echo "╚══════════════════════════════════════════════════════╝"
