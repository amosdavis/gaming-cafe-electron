name: E2E Kiosk UI Tests

# Runs automatically after the kiosk ISO installation test succeeds,
# or manually via workflow_dispatch.
on:
  workflow_run:
    workflows: ["Test Kiosk ISO Installation"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Playwright + Electron E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run when the installation test passed (or manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system packages (xvfb, Electron deps)
        run: |
          sudo apt-get update -qq
          # Install packages that exist on all supported Ubuntu versions
          sudo apt-get install -y xvfb libnss3 libxss1 libxtst6 libxrandr2 libgbm1
          # libgtk-3-0 was renamed libgtk-3-0t64 on Ubuntu 24.04+
          sudo apt-get install -y libgtk-3-0 2>/dev/null \
            || sudo apt-get install -y libgtk-3-0t64 2>/dev/null || true
          # libasound2 was renamed libasound2t64 on Ubuntu 24.04+
          sudo apt-get install -y libasound2 2>/dev/null \
            || sudo apt-get install -y libasound2t64 2>/dev/null || true

      - name: Build Electron app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run -a npx playwright test
        env:
          CI: true
          ELECTRON_DISABLE_GPU: '1'
          KIOSK_E2E_TEST: '1'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
